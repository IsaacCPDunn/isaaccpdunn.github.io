<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; }
        input { padding: 12px; width: 300px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Web Portal</h2>
    <input type="text" id="urlInput" placeholder="Enter URL (e.g., google.com)">
    <button onclick="launchProxy()">Launch in New Tab</button>

    <script>
        function launchProxy() {
            const url = document.getElementById('urlInput').value;
            if (!url) return alert("Please enter a URL");
            
            // This uses a public proxy service as a gateway
            const proxyGateway = "https://croxyproxy.com/";
            window.open(proxyGateway + encodeURIComponent(url), '_blank');
        }
    </script>
</body>
</html>
