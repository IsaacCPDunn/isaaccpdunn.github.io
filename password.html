<!DOCTYPE html>
<html>

<head>
    <title>Password Generator</title>
    <script src="password.js"></script>
    <link href="password.css" rel="stylesheet" />
</head>

<body>
    <h1>Password Generator</h1>
    <input placeholder="Enter characters..." id="chars" />
    <br />
    <input type="number" placeholder="Minimum length..." id="min" />
    <br />
    <input type="number" placeholder="Maximum length..." id="max" />
    <br />
    <button id="generate">Generate</button>
    <noscript>
        <br />
        <div id="noscript">
            It looks like you have JavaScript disabled. Please enable it to use this page.
        </div>
    </noscript>
    <br />
    <textarea readonly id="password"></textarea>
    <br />
    <button id="copy">Copy</button>
</body>

</html>
