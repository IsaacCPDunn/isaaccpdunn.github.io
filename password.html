<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link href="password.css" rel="stylesheet" />
    <script src="password.js" defer></script>
</head>

<body>
    <h1>Password Generator</h1>

    <label for="chars">Allowed characters</label>
    <input placeholder="Enter characters..." id="chars" value="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*" />

    <label for="min">Minimum length</label>
    <input type="number" placeholder="Minimum length..." id="min" min="1" value="12" />

    <label for="max">Maximum length</label>
    <input type="number" placeholder="Maximum length..." id="max" min="1" value="18" />

    <button id="generate" type="button">Generate</button>

    <noscript>
        <div id="noscript">
            It looks like you have JavaScript disabled. Please enable it to use this page.
        </div>
    </noscript>

    <textarea readonly id="password" aria-label="Generated password"></textarea>
    <button id="copy" type="button">Copy</button>

    <p id="status" role="status" aria-live="polite"></p>
</body>

</html>
